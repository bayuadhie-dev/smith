<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP System - Entity Relationship Diagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; }
        .header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 20px 32px; border-bottom: 1px solid #334155; }
        .header h1 { font-size: 22px; font-weight: 700; color: #f8fafc; }
        .header p { font-size: 13px; color: #94a3b8; margin-top: 4px; }
        .controls { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 32px; background: #1e293b; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; align-items: center; }
        .btn { padding: 7px 14px; border: 1px solid #475569; border-radius: 6px; background: #1e293b; color: #cbd5e1; cursor: pointer; font-size: 12px; transition: all 0.15s; }
        .btn:hover { background: #334155; color: #f1f5f9; }
        .btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }
        .zoom-controls { margin-left: auto; display: flex; gap: 6px; align-items: center; }
        .zoom-controls .btn { font-size: 16px; padding: 4px 10px; font-weight: bold; }
        .zoom-label { font-size: 11px; color: #94a3b8; }
        .diagram-wrap { position: relative; overflow: hidden; height: calc(100vh - 120px); background: #f8fafc; margin: 0; cursor: grab; }
        .diagram-wrap:active { cursor: grabbing; }
        .diagram-inner { transform-origin: 0 0; position: absolute; top: 0; left: 0; padding: 40px; }
        .diagram-inner svg { display: block; }
        .hint { position: fixed; bottom: 16px; right: 16px; background: #1e293b; color: #94a3b8; padding: 8px 14px; border-radius: 8px; font-size: 11px; border: 1px solid #334155; z-index: 200; }
    </style>
</head>
<body>
    <div class="header">
        <h1>ERP System &mdash; Entity Relationship Diagram</h1>
        <p>Complete database schema &bull; Scroll to zoom &bull; Drag to pan</p>
    </div>
    <div class="controls">
        <button class="btn active" data-mod="all">All Modules</button>
        <button class="btn" data-mod="core">Core</button>
        <button class="btn" data-mod="production">Production</button>
        <button class="btn" data-mod="sales">Sales &amp; CRM</button>
        <button class="btn" data-mod="purchasing">Purchasing</button>
        <button class="btn" data-mod="finance">Finance</button>
        <button class="btn" data-mod="hr">HR</button>
        <button class="btn" data-mod="quality">Quality</button>
        <button class="btn" data-mod="shipping">Shipping</button>
        <button class="btn" data-mod="maintenance">Maintenance</button>
        <div class="zoom-controls">
            <span class="zoom-label" id="zoomLevel">100%</span>
            <button class="btn" id="zoomIn">+</button>
            <button class="btn" id="zoomOut">&minus;</button>
            <button class="btn" id="zoomFit">Fit</button>
        </div>
    </div>
    <div class="diagram-wrap" id="diagramWrap">
        <div class="diagram-inner" id="diagramInner">
            <div id="mermaidTarget"></div>
        </div>
    </div>
    <div class="hint">Scroll = Zoom &bull; Drag = Pan &bull; Buttons = Filter modules</div>

// =====================
// RENDER + ZOOM/PAN
// =====================
let currentScale = 0.7;
let panX = 0, panY = 0;
let isPanning = false, startX, startY;
const inner = document.getElementById('diagramInner');
const wrap = document.getElementById('diagramWrap');
const target = document.getElementById('mermaidTarget');

function applyTransform() {
    inner.style.transform = `translate(${panX}px, ${panY}px) scale(${currentScale})`;
    document.getElementById('zoomLevel').textContent = Math.round(currentScale * 100) + '%';
}

async function renderDiagram(key) {
    target.innerHTML = '';
    const id = 'mermaid-' + Date.now();
    try {
        const { svg } = await mermaid.render(id, diagrams[key]);
        target.innerHTML = svg;
        panX = 20; panY = 20;
        currentScale = 0.7;
        applyTransform();
    } catch(e) {
        target.innerHTML = '<div style="color:red;padding:40px;font-size:16px;">Render error: ' + e.message + '</div>';
        console.error(e);
    }
}

// Zoom with scroll
wrap.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.05 : 0.05;
    currentScale = Math.max(0.1, Math.min(3, currentScale + delta));
    applyTransform();
}, { passive: false });

// Pan with drag
wrap.addEventListener('mousedown', (e) => {
    isPanning = true; startX = e.clientX - panX; startY = e.clientY - panY;
});
wrap.addEventListener('mousemove', (e) => {
    if (!isPanning) return;
    panX = e.clientX - startX; panY = e.clientY - startY;
    applyTransform();
});
wrap.addEventListener('mouseup', () => isPanning = false);
wrap.addEventListener('mouseleave', () => isPanning = false);

// Zoom buttons
document.getElementById('zoomIn').addEventListener('click', () => {
    currentScale = Math.min(3, currentScale + 0.15); applyTransform();
});
document.getElementById('zoomOut').addEventListener('click', () => {
    currentScale = Math.max(0.1, currentScale - 0.15); applyTransform();
});
document.getElementById('zoomFit').addEventListener('click', () => {
    currentScale = 0.5; panX = 20; panY = 20; applyTransform();
});

// Module buttons
document.querySelectorAll('.controls .btn[data-mod]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.controls .btn[data-mod]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderDiagram(btn.dataset.mod);
    });
});

// Initial render
renderDiagram('all');
