[pytest]
# Pytest Configuration

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Exclude manual tests (integration tests, not unit tests)
pythonpath = .

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --ignore=tests/manual_test
    # --cov=.
    # --cov-report=html
    # --cov-report=term-missing
    # --cov-fail-under=50
    # --maxfail=5

# Coverage options
[coverage:run]
source = .
omit =
    tests/*
    migrations/*
    venv/*
    env/*
    __pycache__/*
    site-packages/*
    setup.py
    conftest.py
    seeds/*
    scripts/*
    add_*.py
    alter_tables.py
    check_*.py
    create_*.py
    debug_*.py
    merge_*.py
    migrate*.py
    monitor_performance.py
    run_server.py
    test_import.py
    utils.py
    company_config/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
